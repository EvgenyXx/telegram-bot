<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseCore — Вход</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏓</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: url('/img.png') no-repeat center center fixed;
            background-size: cover;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255,255,255,0.04) !important;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08) !important;
        }
        .glow-primary { box-shadow: 0 0 30px rgba(99,102,241,0.2), 0 0 60px rgba(99,102,241,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="card glass-card glow-primary max-w-sm w-full">
    <div class="card-body text-center p-8">
        <div class="text-5xl mb-3">🏓</div>
        <h2 class="text-2xl font-bold mb-1">
            <span class="text-white">Pulse</span><span class="text-indigo-400">Core</span>
        </h2>
        <p class="text-xs text-indigo-200/50 mb-6 uppercase tracking-wider">личный кабинет</p>
        <input id="codeInput" type="text" placeholder="Введите код"
               class="input input-bordered w-full text-center text-lg tracking-[0.2em] uppercase bg-transparent border-indigo-500/30 focus:border-indigo-400" autocomplete="off">
        <p id="codeError" class="text-error text-sm hidden mt-2"></p>
        <button onclick="checkCode()" class="btn btn-primary w-full mt-4 bg-gradient-to-r from-indigo-500 to-purple-600 border-0 hover:from-indigo-400 hover:to-purple-500">
            Войти ✨
        </button>
    </div>
</div>

<script>
    document.getElementById("codeInput").addEventListener("keyup", (e) => {
        if (e.key === "Enter") checkCode();
    });

    async function checkCode() {
        const code = document.getElementById("codeInput").value.trim().toUpperCase();
        const errorEl = document.getElementById("codeError");
        if (!code) return;

        try {
            const res = await fetch(`/api/player/code/${code}`);
            if (!res.ok) {
                errorEl.textContent = "❌ Неверный код";
                errorEl.classList.remove("hidden");
                return;
            }
            const player = await res.json();
            localStorage.setItem("playerCode", code);
            localStorage.setItem("playerName", player.name);
            window.location.href = "/dashboard.html";
        } catch (e) {
            errorEl.textContent = "❌ Ошибка соединения";
            errorEl.classList.remove("hidden");
        }
    }
</script>
</body>
</html>
