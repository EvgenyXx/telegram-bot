<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseCore — Личный кабинет</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏓</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<!-- КОНТЕЙНЕР -->
<div class="w-full max-w-md">

    <!-- ЛОГО -->
    <div class="text-center mb-8">
        <div class="text-5xl mb-4">🏓</div>
        <h1 class="text-4xl font-extrabold tracking-tight">
            <span class="text-white">Pulse</span><span class="text-primary">Core</span>
        </h1>
        <p class="text-base-content/50 mt-2">личный кабинет игрока</p>
    </div>

    <!-- ШАГ 1: ВВОД КОДА -->
    <div id="step-code" class="card bg-base-100/30 backdrop-blur-sm border border-base-content/10 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-lg mb-4">🔑 Введите код доступа</h2>
            <input id="codeInput" type="text" placeholder="Например: A1B2C3D4"
                   class="input input-bordered w-full text-center text-lg tracking-widest uppercase"
                   maxlength="8" autocomplete="off">
            <p id="codeError" class="text-error text-sm hidden">❌ Неверный код</p>
            <button onclick="checkCode()" class="btn btn-primary w-full mt-2">
                Войти
            </button>
        </div>
    </div>

    <!-- ШАГ 2: ВЫБОР ДАТ -->
    <div id="step-dates" class="card bg-base-100/30 backdrop-blur-sm border border-base-content/10 shadow-xl hidden">
        <div class="card-body">
            <div class="flex items-center justify-between mb-4">
                <h2 class="card-title text-lg">👋 <span id="playerName"></span></h2>
                <button onclick="logout()" class="btn btn-ghost btn-sm">🚪 Выйти</button>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="label text-sm text-base-content/70">Дата начала</label>
                    <input id="dateStart" type="date" class="input input-bordered w-full">
                </div>
                <div>
                    <label class="label text-sm text-base-content/70">Дата окончания</label>
                    <input id="dateEnd" type="date" class="input input-bordered w-full">
                </div>
            </div>

            <button onclick="calculateSum()" class="btn btn-primary w-full mt-4">
                💰 Рассчитать сумму
            </button>
        </div>
    </div>

    <!-- РЕЗУЛЬТАТ -->
    <div id="step-result" class="card bg-base-100/30 backdrop-blur-sm border border-base-content/10 shadow-xl mt-4 hidden">
        <div class="card-body">
            <h2 class="card-title text-lg mb-4">📊 Результат</h2>
            <div class="stats stats-vertical bg-base-200/50 rounded-box">
                <div class="stat">
                    <div class="stat-title">💰 Общая сумма</div>
                    <div class="stat-value text-success text-2xl" id="resSum">0 ₽</div>
                </div>
                <div class="stat">
                    <div class="stat-title">📊 Среднее за турнир</div>
                    <div class="stat-value text-info text-xl" id="resAvg">0 ₽</div>
                </div>
                <div class="stat">
                    <div class="stat-title">💸 Сумма -3%</div>
                    <div class="stat-value text-warning text-xl" id="resMinus">0 ₽</div>
                </div>
                <div class="stat">
                    <div class="stat-title">🎯 Турниров</div>
                    <div class="stat-value text-primary text-xl" id="resCount">0</div>
                </div>
            </div>
            <button onclick="backToDates()" class="btn btn-ghost btn-sm mt-2">← Назад</button>
        </div>
    </div>

</div>

<script>
    let currentCode = null;
    let currentPlayer = null;

    // Ввод кода — Enter
    document.getElementById("codeInput").addEventListener("keyup", (e) => {
        if (e.key === "Enter") checkCode();
    });

    async function checkCode() {
        const code = document.getElementById("codeInput").value.trim().toUpperCase();
        const errorEl = document.getElementById("codeError");

        if (!code) {
            errorEl.textContent = "❌ Введите код";
            errorEl.classList.remove("hidden");
            return;
        }

        try {
            const res = await fetch(`/api/player/code/${code}`);
            if (!res.ok) {
                errorEl.textContent = "❌ Неверный код";
                errorEl.classList.remove("hidden");
                return;
            }

            const player = await res.json();
            currentCode = code;
            currentPlayer = player;

            document.getElementById("playerName").textContent = player.name;
            document.getElementById("step-code").classList.add("hidden");
            document.getElementById("step-dates").classList.remove("hidden");
            document.getElementById("step-result").classList.add("hidden");
            document.getElementById("codeError").classList.add("hidden");
        } catch (e) {
            errorEl.textContent = "❌ Ошибка соединения";
            errorEl.classList.remove("hidden");
        }
    }

    async function calculateSum() {
        const start = document.getElementById("dateStart").value;
        const end = document.getElementById("dateEnd").value;

        if (!start || !end) {
            alert("❌ Выберите обе даты");
            return;
        }

        try {
            const res = await fetch(`/api/player/code/${currentCode}/sum?start=${start}&end=${end}`);
            if (!res.ok) {
                alert("❌ Ошибка расчёта");
                return;
            }

            const data = await res.json();
            document.getElementById("resSum").textContent = formatMoney(data.sum);
            document.getElementById("resAvg").textContent = formatMoney(data.average);
            document.getElementById("resMinus").textContent = formatMoney(data.minusThreePercent);
            document.getElementById("resCount").textContent = data.count;

            document.getElementById("step-result").classList.remove("hidden");
        } catch (e) {
            alert("❌ Ошибка соединения");
        }
    }

    function backToDates() {
        document.getElementById("step-result").classList.add("hidden");
    }

    function logout() {
        currentCode = null;
        currentPlayer = null;
        document.getElementById("codeInput").value = "";
        document.getElementById("step-code").classList.remove("hidden");
        document.getElementById("step-dates").classList.add("hidden");
        document.getElementById("step-result").classList.add("hidden");
    }

    function formatMoney(value) {
        if (value == null) return "0 ₽";
        return new Intl.NumberFormat("ru-RU").format(Math.round(value)) + " ₽";
    }
</script>
</body>
</html>
