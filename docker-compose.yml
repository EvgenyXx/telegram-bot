services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: botdb
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: 1234
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: spring_bot
    restart: always
    depends_on:
      - db
    environment:
      BOT_TOKEN: 8661205196:AAGAZA1PqYQNg8SW0VFpJLlB4HhGMgrnjpc
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/botdb
      SPRING_DATASOURCE_USERNAME: botuser
      SPRING_DATASOURCE_PASSWORD: 1234
      PROXY_HOST: 163.198.136.100
      PROXY_PORT: 443
      PROXY_SECRET: 7gGydzO7_o8tuWKoyWTRMt12ay5jb20

volumes:
  pgdata: